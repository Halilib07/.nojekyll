    <script>
    var userLocationMarker = null;
    var userLocationCircle = null;
    var watchId = null;
    var map = null;

    document.addEventListener("DOMContentLoaded", function () {
        for (var key in window) {
            if (key.startsWith("map_") && window[key] instanceof L.Map) {
                map = window[key];
                createLocationButton();
                return;
            }
        }
        setTimeout(function() {
            for (var key in window) {
                if (key.startsWith("map_") && window[key] instanceof L.Map) {
                    map = window[key];
                    createLocationButton();
                    break;
                }
            }
        }, 500);
    });

    function createLocationButton() {
        var LocationControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function () {
                var container = L.DomUtil.create('div', 'leaflet-bar');
                container.style.background = 'white';
                container.style.borderRadius = '4px';
                container.style.boxShadow = '0 1px 5px rgba(0,0,0,0.65)';
                var btn = L.DomUtil.create('a', '', container);
                btn.innerHTML = '📍';
                btn.style.width = '36px';
                btn.style.height = '36px';
                btn.style.lineHeight = '36px';
                btn.style.textAlign = 'center';
                btn.style.fontSize = '20px';
                btn.style.cursor = 'pointer';
                btn.title = 'Konumumu Göster';
                btn.onclick = function (e) {
                    e.preventDefault();
                    getUserLocation();
                };
                return container;
            }
        });
        map.addControl(new LocationControl());
    }

    function getUserLocation() {
        if (!navigator.geolocation) {
            alert("Tarayıcı konum desteklemiyor");
            return;
        }
        var btns = document.querySelectorAll('.leaflet-bar a');
        for (var i = 0; i < btns.length; i++) {
            if (btns[i].innerHTML === '📍') {
                btns[i].style.backgroundColor = '#f0f0f0';
                btns[i].innerHTML = '⏳';
                break;
            }
        }
        navigator.geolocation.getCurrentPosition(
            function (pos) {
                showUserLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
                startTracking();
                var btns = document.querySelectorAll('.leaflet-bar a');
                for (var i = 0; i < btns.length; i++) {
                    if (btns[i].innerHTML === '⏳') {
                        btns[i].innerHTML = '📍';
                        btns[i].style.backgroundColor = '';
                        break;
                    }
                }
            },
            function (err) {
                alert("Konum alınamadı: " + err.message);
                var btns = document.querySelectorAll('.leaflet-bar a');
                for (var i = 0; i < btns.length; i++) {
                    if (btns[i].innerHTML === '⏳') {
                        btns[i].innerHTML = '📍';
                        btns[i].style.backgroundColor = '';
                        break;
                    }
                }
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function showUserLocation(lat, lng, acc) {
        if (userLocationMarker) map.removeLayer(userLocationMarker);
        if (userLocationCircle) map.removeLayer(userLocationCircle);
        userLocationMarker = L.circleMarker([lat, lng], {
            radius: 10, color: '#4285F4', fillColor: '#4285F4', fillOpacity: 0.8, weight: 2
        }).addTo(map);
        userLocationCircle = L.circle([lat, lng], {
            radius: acc, color: '#4285F4', fillOpacity: 0.15, weight: 1
        }).addTo(map);
        map.setView([lat, lng], 16);
    }

    function startTracking() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(function (pos) {
            if (userLocationMarker) userLocationMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
            if (userLocationCircle) {
                userLocationCircle.setLatLng([pos.coords.latitude, pos.coords.longitude]);
                userLocationCircle.setRadius(pos.coords.accuracy);
            }
        }, function (err) {
            console.log("Konum takip hatası:", err.message);
        }, { enableHighAccuracy: true });
    }
    </script>
